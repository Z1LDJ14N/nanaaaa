<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Nanaa 💌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #fdf2f4;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #hal1, #hal2 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
            position: absolute;
        }

        #hal2 { display: none; padding: 20px; box-sizing: border-box; }

        /* Halaman Awal */
        .envelope {
            font-size: 110px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(.47,1.64,.41,.8);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            animation: float 2.5s infinite ease-in-out;
        }
        .envelope:hover { transform: scale(1.2); }

        .btn-pencet {
            margin-top: 20px;
            font-weight: 600;
            color: #c2185b;
            background: #ffffff;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(194, 24, 91, 0.2);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Halaman Kedua */
        .container-foto {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .container-foto img {
            width: 140px;
            height: 190px;
            object-fit: cover;
            border-radius: 20px;
            border: 6px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
        }
        .container-foto img:nth-child(2) { transform: rotate(3deg); }

        .teks-pesan {
            background: rgba(255, 255, 255, 0.8);
            padding: 25px;
            border-radius: 30px;
            max-width: 360px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(8px);
        }

        .judul {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: #ad1457;
            display: block;
            margin-bottom: 15px;
        }

        .isi {
            font-size: 16px;
            color: #4a4a4a;
            line-height: 1.7;
        }

        .hati { color: #ff4081; font-size: 35px; margin-top: 15px; }

        /* Animasi */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .muncul { animation: fadeIn 1.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="hal1">
        <div class="envelope" onclick="bukaSekarang()">💌</div>
        <div class="btn-pencet" onclick="bukaSekarang()">pencet</div>
    </div>

    <div id="hal2">
        <div class="container-foto">
            <img src="https://autoresbot.com/tmp_files/2f5ab5c7-4455-464d-b510-1625727e52a1.jpg">
            <img src="https://autoresbot.com/tmp_files/cb09af4b-c457-4e4f-8a9d-17edc254a533.jpg">
        </div>
        
        <div class="teks-pesan">
            <span class="judul">NANAA MAU NGGA JADI PACARKU?</span>
            <span class="isi">AKU GATAU KOK BISA TERPIKAT KALI AKU SAMA HATI KAMU NANAA, I LOVE YOU</span>
            <div class="hati">❤️</div>
        </div>

        <audio id="audio" loop>
            <source src="https://files.catbox.moe/978w1d.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function bukaSekarang() {
            document.getElementById('hal1').style.display = 'none';
            const h2 = document.getElementById('hal2');
            h2.style.display = 'flex';
            h2.classList.add('muncul');
            
            const lagu = document.getElementById('audio');
            lagu.play().catch(e => console.log("Autoplay dicegah browser, tapi jalan setelah klik!"));
        }
    </script>
</body>
</html>
